targetNamespace: ""
parameters: {}
packages:
  - name: github
    environment: {}
    parameters: {}
    annotations: {}
    actions:
      - name: rerequest
        binary: false
        main: ""
        runtime: "python:3.11"
        # `raw` (not `true`) is mandatory for HMAC webhook handlers: with
        # `web: true` DO sets the `raw-http: false` annotation and the
        # runtime parses JSON bodies into args, so the bytes GitHub signed
        # don't survive to verification. `raw` keeps the body intact (base64
        # in args.http.body, isBase64Encoded=true).
        web: raw
        webSecure: false
        parameters: {}
        environment:
          GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
          GITHUB_TOKEN: ${GITHUB_TOKEN}
          # Set DEBUG=1 in the deploy environment to enable diagnostic fields
          # in 401 responses. Quoted so values like "0" stay a string after
          # substitution — doctl rejects numeric env values.
          DEBUG: "${DEBUG}"
        annotations: {}
        limits:
          # Each GitHub call uses an 8s HTTP timeout (handler.HTTP_TIMEOUT) and
          # the handler makes at most three sequential calls (24s worst case),
          # leaving comfortable margin under this 60s action timeout.
          timeout: 60000
          memory: 256
          logs: 10
